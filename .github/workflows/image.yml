name: Lossless Image Optimization

on:
push:
branches:
- main
- master
pull_request:

jobs:
optimize-images:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install optimization tools
    run: |
      sudo apt-get update
      sudo apt-get install -y pngquant optipng jpegoptim gifsicle webp imagemagick
      npm install -g svgo

  - name: Optimize PNG
    run: |
      find . -type f -iname "*.png" -exec optipng -o2 {} \;

  - name: Optimize JPG/JPEG
    run: |
      find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" \) -exec jpegoptim --strip-all {} \;

  - name: Optimize GIF
    run: |
      find . -type f -iname "*.gif" -exec gifsicle -O3 -b {} \;

  - name: Optimize SVG
    run: |
      find . -type f -iname "*.svg" -exec svgo {} \;

  - name: Optimize WEBP
    run: |
      find . -type f -iname "*.webp" -exec cwebp -quiet {} -o {} \;

  - name: Optimize ICO
    run: |
      find . -type f -iname "*.ico" -exec convert {} -strip {} \;

  - name: Commit optimized images
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add .

      if git diff --cached --quiet; then
        echo "No changes"
      else
        git commit -m "chore: optimize images"
        git push
      fi
```

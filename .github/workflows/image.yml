name: Lossless Image Optimization

on:
push:
branches: [ main, master ]
pull_request:
branches: [ main, master ]

jobs:
optimize-images:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Install optimization tools
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        pngquant \
        optipng \
        jpegoptim \
        gifsicle \
        webp \
        libwebp-dev \
        imagemagick

      # install svgo
      npm install -g svgo

  - name: Optimize PNG
    run: |
      find . -type f -iname "*.png" -print0 | while IFS= read -r -d '' file; do
        optipng -o2 "$file" || true
      done

  - name: Optimize JPG / JPEG
    run: |
      find . -type f \( -iname "*.jpg" -o -iname "*.jpeg" \) -print0 | while IFS= read -r -d '' file; do
        jpegoptim --strip-all "$file" || true
      done

  - name: Optimize GIF
    run: |
      find . -type f -iname "*.gif" -print0 | while IFS= read -r -d '' file; do
        gifsicle -O3 "$file" -o "$file" || true
      done

  - name: Optimize WEBP
    run: |
      find . -type f -iname "*.webp" -print0 | while IFS= read -r -d '' file; do
        cwebp -quiet "$file" -o "$file" || true
      done

  - name: Optimize SVG
    run: |
      find . -type f -iname "*.svg" -print0 | while IFS= read -r -d '' file; do
        svgo "$file"
      done

  - name: Optimize ICO
    run: |
      find . -type f -iname "*.ico" -print0 | while IFS= read -r -d '' file; do
        convert "$file" -strip "$file"
      done

  - name: Commit optimized images
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions@github.com"

      git add .

      if git diff --cached --quiet; then
        echo "No optimized images to commit"
      else
        git commit -m "chore: lossless image optimization"
        git push
      fi
```
